name: CI/CD — Tests, Build & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # -----------------------------------------------------------------
  # Job 1 : Tests unitaires et d'intégration (sans vrai modèle)
  # -----------------------------------------------------------------
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: |
          pip install -r requirements.txt
          pip install -r requirements_dev.txt

      - name: Lancement des tests (sans vrai modèle)
        run: pytest -v -m "not local" --cov=src/api --cov-report=term-missing

  # -----------------------------------------------------------------
  # Job 2 : Build Docker, push Docker Hub, déploiement Render
  # -----------------------------------------------------------------
  build-deploy:
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Téléchargement des fichiers modèle depuis la GitHub Release
        run: |
          mkdir -p model
          gh release download v1.0.0 --pattern "*.pkl" --dir model --clobber
          gh release download v1.0.0 --pattern "*.json" --dir model --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et push de l'image Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/agritech-api:latest
          platforms: linux/amd64

      - name: Déploiement sur Render
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
